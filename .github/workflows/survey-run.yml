# Scheduled survey pipeline - requires repository secrets (see README).
name: Survey run

on:
  workflow_dispatch:
  schedule:
    # Mondays & Thursdays at 09:00 UTC. The pipeline (survey + classify + digest) runs in full each time;
    # the "Schedule gate" only blocks scheduled runs until the DB is bootstrapped.
    - cron: '0 9 * * 1,4'

concurrency:
  group: survey-run
  cancel-in-progress: false

jobs:
  full-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Use Node 24 for JavaScript-based actions (checkout, setup-node) per GitHub deprecation of Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Write environment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL secret" && exit 1)
          test -n "$SUPABASE_SECRET_KEY" || (echo "Missing SUPABASE_SECRET_KEY secret" && exit 1)
          test -n "$OPENROUTER_API_KEY" || (echo "Missing OPENROUTER_API_KEY secret" && exit 1)
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY
          OPENROUTER_API_KEY=$OPENROUTER_API_KEY
          NEWS_API_KEY=$NEWS_API_KEY
          EOF

      - name: Schedule gate
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual run: should_run=true (ignores bootstrap gate)"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The cron itself sets the cadence (Mon & Thu). The only scheduled gate is bootstrap: don't run
          # on a schedule until at least one survey run exists (trigger the first run manually).
          base="${SUPABASE_URL%/}"
          resp=$(curl -fsS "${base}/rest/v1/runs?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Accept: application/json")
          n=$(echo "$resp" | jq 'length')
          if [ "$n" -eq 0 ]; then
            echo "Bootstrap: no rows in runs yet - skipping. Trigger Survey run manually once in the Actions tab."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Bootstrapped: running scheduled pipeline (survey + classify + digest)."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Full pipeline
        if: steps.gate.outputs.should_run == 'true'
        run: npm run full-run
